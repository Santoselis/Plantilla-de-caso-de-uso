<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantilla Caso de Uso - Kendall & Kendall</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>PLANTILLA DE CASO DE USO</h1>

        <form id="useCaseForm">
            <!-- Campos de la plantilla -->
            <div class="form-group">
                <label>1. NOMBRE DEL CASO DE USO:</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="form-group">
                <label>2. ACTOR(ES):</label>
                <input type="text" id="actores" required>
            </div>

            <div class="form-group">
                <label>3. DESCRIPCIÓN BREVE:</label>
                <textarea id="descripcion" rows="3" required></textarea>
            </div>

            <div class="form-group">
                <label>4. PRECONDICIONES:</label>
                <textarea id="precondiciones" rows="2" required></textarea>
            </div>

            <div class="form-group">
                <label>5. FLUJO PRINCIPAL DE EVENTOS:</label>
                <textarea id="flujoPrincipal" rows="5" required></textarea>
            </div>

            <div class="form-group">
                <label>6. FLUJOS ALTERNATIVOS:</label>
                <textarea id="flujosAlternativos" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>7. POSTCONDICIONES:</label>
                <textarea id="postcondiciones" rows="2" required></textarea>
            </div>

            <div class="form-group">
                <label>8. EXCEPCIONES:</label>
                <textarea id="excepciones" rows="3"></textarea>
            </div>

            <!-- Botones -->
            <div class="button-group">
                <button type="button" 
				onclick="window.print()">Imprimir/Guartdar como PDF
				</button>
				<button type="reset">Limpiar Formulario
				</button>
            </div>
        </form>
    </div>
</body>
</html>
